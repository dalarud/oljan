general:
  timezone: UTC
  loop_interval_seconds: 15
  data_dir: ./data
  log_level: INFO
instruments:
- name: Brent (UKOIL)
  symbol: BZ=F
  primary: true
- name: WTI
  symbol: CL=F
  primary: false
market_data:
  provider: yahoo
  fallback_provider:
  - twelvedata
  - alphavantage
  twelvedata_symbols:
    BZ=F: BNO
    CL=F: USO
  twelvedata_scale_to_benchmark: true
  # (scale_override calibrated once; on CI Yahoo usually gives real BZ=F directly)
  # (TradingView UKOIL = 88.43 vs raw BNO 49.32 on 2026-07-21). Overrides the
  # stale free daily anchor so price + levels sit on the real UKOIL level.
  # Recalibrate if the displayed price drifts from your screen.
  scale_override:
    BZ=F: 1.792985
  timeframes:
  - interval: 5m
    lookback: 10d
  - interval: 1h
    lookback: 60d
  analysis_timeframe: 5m
  daily_lookback: 5y
  refresh_seconds: 300
  fast_refresh_seconds: 60
  fast_skip_minutes: 20
  yahoo_cooldown_seconds: 300
  request_spacing: 3.0
  max_retries: 2
indicators:
  ema_fast: 12
  ema_slow: 26
  rsi_period: 14
  atr_period: 14
  bb_period: 20
  bb_std: 2.0
  sr_lookback: 300
  sr_pivot_width: 3
  sr_cluster_pct: 0.5
  volume_avg_period: 20
position:
  leverage: 10
  side: long
  entry_price: null
  broker_offset: 0.0
trader_profile:
  style: mean_reversion       # mean_reversion | momentum | breakout
  indicator: rsi
  rsi_oversold: 30
  rsi_overbought: 70
  horizon: scalp              # scalp | intraday | swing (korta trades)
  primary_side: both          # long | short | both
  timeframe: 5m
setups:
  enabled: true               # proactive alerts when a trade condition triggers
  level_proximity_pct: 0.35   # how close to a level counts as "at" it
  cooldown_minutes: 30        # min gap between same-side setup alerts
news:
  stream_enabled: false
  stream_gather_seconds: 25
  stream_priority_gather_seconds: 8
  poll_seconds: 60
  collector_timeout_seconds: 25
  max_age_minutes: 240
